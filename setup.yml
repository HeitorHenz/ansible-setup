- name: Setup Arch Linux
  hosts: localhost
  connection: local

  vars:
    system_packages:
      - fish
      - helix
      - stow
      - flatpak
      - ttf-fira-code
      - podman
      - podman-compose
      - gnome-keyring
      - libfreeaptx
      - libldac
      - pipewire-audio
      - libsecret
      - xdg-desktop-portal-hyprland
      - xdg-desktop-portal-gtk
      - sddm
      - qt5-graphicaleffects
      - qt5-quickcontrols2
      - qt5-svg

    yay_apps:
      - sddm-theme-sugar-candy-git
      - dms-shell-bin
    flatpak_apps:
      - org.mozilla.firefox
      - dev.zed.Zed
      - com.rioterm.Rio
      - md.obsidian.Obsidian
      - io.github.kolunmi.Bazaar
    cargo_tools:
      - uv
      - starship
      - ripgrep
      - bat
      - eza
      - zoxide
      - zellij
    uv_tools:
      - ruff
      - ty

  tasks:
    # Packages
    - name: Install System Packages
      become: true
      community.general.pacman:
        name: "{{ system_packages }}"
        state: present
        update_cache: yes

    # Rustup
    - name: Install rustup
      ansible.builtin.shell:
        cmd: "curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y"
        creates: "{{ lookup('env', 'HOME') }}/.cargo/bin/rustup"

    # Cargo
    - name: Install cargo tools
      community.general.cargo:
        name: "{{ item }}"
        state: present
      loop: "{{ cargo_tools }}"
      environment:
        PATH: "{{ lookup('env', 'HOME') }}/.cargo/bin:{{ lookup('env', 'PATH') }}"

    # uv tools
    - name: Install uv tools
      ansible.builtin.command:
        cmd: "uv tool install {{ item }}"
        creates: "{{ lookup('env', 'HOME') }}/.local/bin/{{ item }}"
      loop: "{{ uv_tools }}"

    # Flathub
    - name: Enable Flathub Repository
      community.general.flatpak_remote:
        name: flathub
        state: present
        flatpakrepo_url: https://dl.flathub.org/repo/flathub.flatpakrepo

    - name: Install Flatpak Applications
      community.general.flatpak:
        name: "{{ flatpak_apps }}"
        remote: flathub
        state: present

    # AUR
    - name: Install AUR packages
      kewlfft.aur.aur:
        name: "{{ yay_apps }}"
        use: yay
        state: present

    # SDDM Configuration
    - name: Create SDDM configuration directory
      become: true
      ansible.builtin.file:
        path: /etc/sddm.conf.d
        state: directory
        mode: '0755'

    - name: Configure SDDM to use Sugar Candy theme
      become: true
      ansible.builtin.copy:
        dest: /etc/sddm.conf.d/theme.conf
        content: |
          [Theme]
          Current=sugar-candy
        mode: '0644'

    - name: Enable SDDM Service on boot
      become: true
      ansible.builtin.systemd:
        name: sddm
        enabled: yes

    # Conf
    - name: Clone dotfiles
      git:
        repo: "https://github.com/HeitorHenz/.dotfiles"
        dest: "{{ lookup('env', 'HOME') }}/.dotfiles"
        update: yes

    # Stow
    - name: Cleanup for Stow
      ansible.builtin.file:
        path: "{{ lookup('env', 'HOME') }}/{{ item }}"
        state: absent
      loop:
        - .bashrc
        - .bash_profile

    - name: Run Stow
      ansible.builtin.shell: stow -R */
      args:
        chdir: "{{ lookup('env', 'HOME') }}/.dotfiles"
      changed_when: false

    # Fish
    - name: Set fish as the default shell
      become: true
      ansible.builtin.user:
        name: "{{ lookup('env', 'USER') }}"
        shell: /usr/bin/fish
