- name: Setup Arch Linux
  hosts: localhost
  connection: local

  vars:
    system_packages:
      - fish
      - helix
      - stow
      - flatpak
      - ttf-fira-code
      - podman
      - podman-compose
      - gnome-keyring
      - libfreeaptx
      - libldac
      - pipewire-audio
      - libsecret
      - xdg-desktop-portal-hyprland
      - xdg-desktop-portal-gtk
      - base-devel
      - git
    yay_apps:
      - sddm-theme-sugar-candy-git
      - dms-shell-bin
    flatpak_apps:
      - org.mozilla.firefox
      - dev.zed.Zed
      - com.rioterm.Rio
      - md.obsidian.Obsidian
      - io.github.kolunmi.Bazaar
    cargo_tools:
      - uv
      - starship
      - ripgrep
      - bat
      - eza
      - zoxide
      - zellij
    uv_tools:
      - ruff
      - ty

  tasks:
    # Packages
    - name: Install System Packages
      become: true
      community.general.pacman:
        name: "{{ system_packages }}"
        state: present
        update_cache: yes

    # Rustup
    - name: Install rustup
      ansible.builtin.shell:
        cmd: "curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y"
        creates: "{{ lookup('env', 'HOME') }}/.cargo/bin/rustup"

    # Cargo
    - name: Install cargo tools
      community.general.cargo:
        name: "{{ item }}"
        state: present
      loop: "{{ cargo_tools }}"
      environment:
        PATH: "{{ lookup('env', 'HOME') }}/.cargo/bin:{{ lookup('env', 'PATH') }}"

    # uv tools
    - name: Install uv tools
      command:
        cmd: "uv tool install {{ item }}"
      loop: "{{ uv_tools }}"
      environment:
        PATH: "{{ lookup('env', 'HOME') }}/.cargo/bin:{{ lookup('env', 'PATH') }}"

    # Flathub
    - name: Enable Flathub Repository
      community.general.flatpak_remote:
        name: flathub
        state: present
        flatpakrepo_url: https://dl.flathub.org/repo/flathub.flatpakrepo

    - name: Install Flatpak Applications
      community.general.flatpak:
        name: "{{ item }}"
        remote: flathub
        state: present
      loop: "{{ flatpak_apps }}"

    # --- Secure AUR Setup ---
    - name: Create the 'aur_builder' user
      become: true
      ansible.builtin.user:
        name: aur_builder
        create_home: yes
        group: wheel

    - name: Allow 'aur_builder' to run 'sudo pacman' without a password
      become: true
      ansible.builtin.lineinfile:
        path: /etc/sudoers.d/11-install-aur_builder
        line: 'aur_builder ALL=(ALL) NOPASSWD: /usr/bin/pacman'
        create: yes
        mode: '0644'
        validate: 'visudo -cf %s'

    # AUR Helper Installation
    - name: Bootstrap yay-bin using native makepkg
      become: true
      become_user: aur_builder
      kewlfft.aur.aur:
        name: yay-bin
        use: makepkg
        state: present

    # AUR Packages
    - name: Install AUR packages via yay
      become: true
      become_user: aur_builder
      kewlfft.aur.aur:
        name: "{{ yay_apps }}"
        use: yay
        state: present

    # Conf
    - name: Clone dotfiles
      git:
        repo: "https://github.com/HeitorHenz/.dotfiles"
        dest: "{{ lookup('env', 'HOME') }}/.dotfiles"
        update: yes

    # Stow
    - name: Cleanup for Stow
      ansible.builtin.file:
        path: "{{ lookup('env', 'HOME') }}/{{ item }}"
        state: absent
      loop:
        - .bashrc
        - .bash_profile

    - name: Run Stow
      ansible.builtin.shell: stow -R */
      args:
        chdir: "{{ lookup('env', 'HOME') }}/.dotfiles"

    # Fish
    - name: Set fish as the default shell
      become: true
      ansible.builtin.user:
        name: "{{ lookup('env', 'USER') }}"
        shell: /usr/bin/fish
