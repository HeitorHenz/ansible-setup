- name: Setup Arch Linux
  hosts: localhost
  connection: local

  vars:
    system_packages:
      - rustup
      - fish
      - helix
      - stow
      - flatpak
      - ttf-fira-code
      - podman
      - podman-compose
      - gnome-keyring
      - libfreeaptx
      - libldac
      - pipewire-audio
      - libsecret
      - xdg-desktop-portal-hyprland
      - xdg-desktop-portal-gtk
      - sddm
      - qt6-5compat
      - qt6-declarative
      - qt6-svg
      - qt6-wayland
      - zed
      - rio
      - uv
      - starship
      - ripgrep
      - bat
      - eza
      - zoxide
      - zellij
    aur_apps:
      - sddm-eucalyptus-drop
      - dms-shell
    flatpak_apps:
      - org.mozilla.firefox
      - md.obsidian.Obsidian
      - io.github.kolunmi.Bazaar
    uv_tools:
      - ruff
      - ty

  tasks:
    - name: Pacman conf customization
      become: true
      community.general.ini_file:
        path: /etc/pacman.conf
        section: options
        option: "{{ item.option }}"
        value: "{{ item.value | default(omit) }}"
        allow_no_value: "{{ item.no_value | default(false) }}"
        state: present
      loop:
        - { option: 'Color', no_value: true }
        - { option: 'ParallelDownloads', value: '5' }
        - { option: 'ILoveCandy', no_value: true }
  
    # Packages
    - name: Install System Packages
      become: true
      community.general.pacman:
        name: "{{ system_packages }}"
        state: present
        update_cache: yes

    # uv tools
    - name: Install uv tools
      ansible.builtin.command:
        cmd: "uv tool install {{ item }}"
        creates: "{{ ansible_facts['env']['HOME'] }}/.local/bin/{{ item }}"
      loop: "{{ uv_tools }}"

    # Flathub
    - name: Enable Flathub Repository
      community.general.flatpak_remote:
        name: flathub
        state: present
        flatpakrepo_url: https://dl.flathub.org/repo/flathub.flatpakrepo

    - name: Install Flatpak Applications
      community.general.flatpak:
        name: "{{ flatpak_apps }}"
        remote: flathub
        state: present

    # Sudoers Configuration for Paru
    - name: Allow passwordless sudo for pacman
      become: true
      ansible.builtin.lineinfile:
        path: /etc/sudoers.d/pacman-nopasswd
        line: "{{ ansible_facts['user_id'] }} ALL=(ALL) NOPASSWD: /usr/bin/pacman"
        create: yes
        mode: "0440"
        validate: "visudo -cf %s"

    # AUR
    - name: Install AUR packages
      kewlfft.aur.aur:
        name: "{{ aur_apps }}"
        use: paru
        state: present

    # SDDM Configuration
    - name: Create SDDM configuration directory
      become: true
      ansible.builtin.file:
        path: /etc/sddm.conf.d
        state: directory
        mode: "0755"

    - name: Configure SDDM to use Eucalyptus Drop theme
      become: true
      ansible.builtin.copy:
        dest: /etc/sddm.conf.d/theme.conf
        content: |
          [Theme]
          Current=eucalyptus-drop
        mode: '0644'

    - name: Enable SDDM Service on boot
      become: true
      ansible.builtin.systemd:
        name: sddm
        enabled: yes

    # Conf
    - name: Clone dotfiles
      ansible.builtin.git:
        repo: "https://github.com/HeitorHenz/.dotfiles"
        dest: "{{ ansible_facts['env']['HOME'] }}/.dotfiles"
        update: yes
        force: yes

    # Stow
    - name: Check for conflicting default files
      ansible.builtin.stat:
        path: "{{ ansible_facts['env']['HOME'] }}/{{ item }}"
      loop:
        - .bashrc
        - .bash_profile
        - .config/hypr/hyprland.conf
        - .config/rio/config.toml
        - .config/zed/settings.json
      register: stow_conflicts

    - name: Remove conflicting files if they are real files (not links)
      ansible.builtin.file:
        path: "{{ ansible_facts['env']['HOME'] }}/{{ item.item }}"
        state: absent
      loop: "{{ stow_conflicts.results }}"
      when: item.stat.exists and not item.stat.islnk

    - name: Find all dotfile directories
      ansible.builtin.find:
        paths: "{{ ansible_facts['env']['HOME'] }}/.dotfiles"
        file_type: directory
        recurse: no
        hidden: false
      register: dotfile_dirs

    - name: Run Stow
      ansible.builtin.command: "stow -R {{ item.path | basename }}"
      args:
        chdir: "{{ ansible_facts['env']['HOME'] }}/.dotfiles"
      loop: "{{ dotfile_dirs.files }}"
      loop_control:
        label: "{{ item.path | basename }}"
      changed_when: false

    # Fish
    - name: Set fish as the default shell
      become: true
      ansible.builtin.user:
        name: "{{ ansible_facts['user_id'] }}"
        shell: /usr/bin/fish
