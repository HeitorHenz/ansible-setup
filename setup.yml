- name: Setup Arch Linux
  hosts: localhost
  connection: local

  vars:
    system_packages:
      - fish
      - helix
      - stow
      - flatpak
      - ttf-fira-code
      - podman
      - podman-compose
      - gnome-keyring
      - libfreeaptx
      - libldac
      - pipewire-audio
      - libsecret
      - xdg-desktop-portal-hyprland
      - xdg-desktop-portal-gtk
      - sddm
      - qt6-5compat
      - qt6-declarative
      - qt6-svg
      - qt6-wayland

    aur_apps:
      - sddm-eucalyptus-drop
      - dms-shell-bin
    flatpak_apps:
      - org.mozilla.firefox
      - dev.zed.Zed
      - com.rioterm.Rio
      - md.obsidian.Obsidian
      - io.github.kolunmi.Bazaar
    cargo_tools:
      - uv
      - starship
      - ripgrep
      - bat
      - eza
      - zoxide
      - zellij
    uv_tools:
      - ruff
      - ty

  tasks:
    - name: Pacman conf customization
      become: true
      ansible.builtin.lineinfile:
        path: /etc/pacman.conf
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
      loop:
        - { regexp: '^#Color', line: 'Color' }
        - { regexp: '^#ParallelDownloads', line: 'ParallelDownloads = 5' }
  
    # Packages
    - name: Install System Packages
      become: true
      community.general.pacman:
        name: "{{ system_packages }}"
        state: present
        update_cache: yes

    # Rustup
    - name: Install rustup
      ansible.builtin.shell:
        cmd: "curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y"
        creates: "{{ ansible_env.HOME }}/.cargo/bin/rustup"

    # Cargo
    - name: Install cargo tools
      community.general.cargo:
        name: "{{ item }}"
        state: present
      loop: "{{ cargo_tools }}"
      environment:
        PATH: "{{ ansible_env.HOME }}/.cargo/bin:{{ ansible_env.PATH }}"

    # uv tools
    - name: Install uv tools
      ansible.builtin.command:
        cmd: "uv tool install {{ item }}"
        creates: "{{ ansible_env.HOME }}/.local/bin/{{ item }}"
      loop: "{{ uv_tools }}"

    # Flathub
    - name: Enable Flathub Repository
      community.general.flatpak_remote:
        name: flathub
        state: present
        flatpakrepo_url: https://dl.flathub.org/repo/flathub.flatpakrepo

    - name: Install Flatpak Applications
      community.general.flatpak:
        name: "{{ flatpak_apps }}"
        remote: flathub
        state: present

    # Sudoers Configuration for Paru
    - name: Allow passwordless sudo for pacman
      become: true
      ansible.builtin.lineinfile:
        path: /etc/sudoers.d/pacman-nopasswd
        line: "{{ ansible_user_id }} ALL=(ALL) NOPASSWD: /usr/bin/pacman"
        create: yes
        mode: "0440"
        validate: "visudo -cf %s"

    # AUR
    - name: Install AUR packages
      kewlfft.aur.aur:
        name: "{{ aur_apps }}"
        use: paru
        state: present

    # SDDM Configuration
    - name: Create SDDM configuration directory
      become: true
      ansible.builtin.file:
        path: /etc/sddm.conf.d
        state: directory
        mode: "0755"

    - name: Configure SDDM to use Eucalyptus Drop theme
      become: true
      ansible.builtin.copy:
        dest: /etc/sddm.conf.d/theme.conf
        content: |
          [Theme]
          Current=eucalyptus-drop
        mode: '0644'

    - name: Enable SDDM Service on boot
      become: true
      ansible.builtin.systemd:
        name: sddm
        enabled: yes

    # Conf
    - name: Clone dotfiles
      git:
        repo: "https://github.com/HeitorHenz/.dotfiles"
        dest: "{{ ansible_env.HOME }}/.dotfiles"
        update: yes

    # Stow
    - name: Cleanup default bash files to prevent Stow conflicts
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/{{ item }}"
        state: absent
      loop:
        - .bashrc
        - .bash_profile

    - name: Find all dotfile directories
      ansible.builtin.find:
        paths: "{{ ansible_env.HOME }}/.dotfiles"
        file_type: directory
        recurse: no
        hidden: false
      register: dotfile_dirs

    - name: Run Stow
      community.general.stow:
        state: latest
        package: "{{ item.path | basename }}"
        dir: "{{ ansible_env.HOME }}/.dotfiles"
        target: "{{ ansible_env.HOME }}"
      loop: "{{ dotfile_dirs.files }}"
      loop_control:
        label: "{{ item.path | basename }}"

    # Fish
    - name: Set fish as the default shell
      become: true
      ansible.builtin.user:
        name: "{{ ansible_user_id }}"
        shell: /usr/bin/fish
